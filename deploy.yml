## Troubleshooting

**Issue**: GitHub Actions failing with "Permission denied"
- Verify service account has correct IAM roles
- Check GCP_SA_KEY secret is properly set

**Issue**: Cloud Run deployment fails
- Check if all required APIs are enabled
- Verify secrets exist and have correct permissions

**Issue**: Local development can't connect to Firestore
- Ensure GCP_PROJECT_ID is set correctly
- Check if you're authenticated: `gcloud auth application-default login`

